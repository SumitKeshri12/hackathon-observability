services:
  # --- Ingress ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - postgres
      - redis
    networks:
      - hackathon-network

  redis:
    image: redis:7-alpine
    networks:
      - hackathon-network

  # --- Applications ---
  backend:
    build:
      context: ../../backend
      dockerfile: docker/Dockerfile
      target: dev
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=hackathon
      - DB_USERNAME=admin
      - DB_PASSWORD=secret
    volumes:
      - ../../backend:/var/www/html
      - ../php/fpm-tuning.conf:/usr/local/etc/php-fpm.d/zz-tuning.conf
    networks:
      - hackathon-network
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ../../frontend
      dockerfile: docker/Dockerfile
      target: dev
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    networks:
      - hackathon-network

  # --- Database & Cache ---
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=hackathon
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
    volumes:
      - hackathon-db:/var/lib/postgresql/data
    networks:
      - hackathon-network

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@kombee.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    networks:
      - hackathon-network
    depends_on:
      - postgres

  # --- Observability Stack ---
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - hackathon-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ../grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ../grafana/provisioning/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - hackathon-network

  loki:
    image: grafana/loki:latest
    volumes:
      - ../loki/local-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml -validation.allow-structured-metadata=false
    networks:
      - hackathon-network

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../promtail/config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - hackathon-network

  tempo:
    image: grafana/tempo:2.4.1
    volumes:
      - ../tempo/tempo.yaml:/etc/tempo.yaml
    command: [ "-config.file=/etc/tempo.yaml" ]
    networks:
      - hackathon-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - hackathon-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus exporter
    networks:
      - hackathon-network
    depends_on:
      - tempo

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - -nginx.scrape-uri=http://nginx:80/metrics
    ports:
      - "9113:9113"
    networks:
      - hackathon-network
    depends_on:
      - nginx

  k6:
    image: grafana/k6:latest
    volumes:
      - ../load-tests:/scripts
    networks:
      - hackathon-network

networks:
  hackathon-network:
    driver: bridge

volumes:
  hackathon-db:
  prometheus-data:
  grafana-data:
